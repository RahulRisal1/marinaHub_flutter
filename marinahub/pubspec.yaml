name: marinahub
description: "MarinaHub - Premium marina berth booking platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  shared_preferences: ^2.5.5
  flutter_svg: ^2.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.5+1
  mapbox_maps_flutter: ^2.23.1
  geolocator: ^12.0.0
  permission_handler: ^11.0.0
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/portImages/
    - assets/fonts/
    - .env

  fonts:
    - family: fred
      fonts:
        - asset: assets/fonts/Fred.ttf
